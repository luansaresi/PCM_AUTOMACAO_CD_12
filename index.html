<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PCM — Controle de Manutenção</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b27;--surf2:#1c2236;--bdr:#252d42;--bdr2:#2e3a56;
  --acc:#f97316;--acc2:#fb923c;--accD:rgba(249,115,22,.12);
  --txt:#dde3f0;--mut:#5a6a8a;--mut2:#7a8aaa;
  --red:#ef4444;--grn:#22c55e;--ylw:#f59e0b;--blu:#3b82f6;--pur:#8b5cf6;--pnk:#c026d3;
  --r:10px;--r2:8px
}
body{background:var(--bg);color:var(--txt);font-family:'Roboto Condensed',sans-serif;min-height:100vh;font-size:14px}
.hide{display:none!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}
/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
#ls::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% -10%,rgba(249,115,22,.18),transparent)}
.lc{position:relative;z-index:1;background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:44px 40px;width:430px;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.lb-title{font-size:26px;font-weight:800;color:var(--acc)}
.lb-sub{font-size:12px;color:var(--mut);margin-bottom:28px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.fld input{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:11px 14px;color:var(--txt);font-family:'Roboto Condensed',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fld input:focus{border-color:var(--acc)}
#lbtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-family:'Roboto Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s}
#lbtn:hover{background:var(--acc2)}
#lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;padding:8px;background:rgba(239,68,68,.08);border-radius:6px}
.dbox{margin-top:20px;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px}
.dt{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.dr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-size:12px;color:var(--mut2)}
.dbs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.db{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;background:transparent}
/* APP */
#app{display:flex;min-height:100vh}
.sb{width:230px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.sb-logo{height:32px;object-fit:contain;display:block;margin-bottom:6px;max-width:100%}
.b-title{font-size:18px;font-weight:800;color:var(--acc)}
.b-sub{font-size:10px;color:var(--mut);margin-top:2px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--mut2);transition:all .15s;margin-bottom:2px;font-size:13px;font-weight:600;user-select:none}
.ni:hover{background:var(--surf2);color:var(--txt)}
.ni.active{background:var(--accD);color:var(--acc)}
.sb-foot{padding:14px;border-top:1px solid var(--bdr)}
.ub{background:var(--surf2);border-radius:8px;padding:12px}
.uav{width:34px;height:34px;border-radius:50%;background:var(--accD);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--acc);flex-shrink:0}
.unm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.url{font-size:11px;color:var(--mut);margin-top:1px}
.ur{display:flex;align-items:center;gap:10px}
.lout{width:100%;background:transparent;border:1px solid var(--bdr);color:var(--mut);border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .15s;font-family:'Roboto Condensed',sans-serif}
.lout:hover{border-color:var(--red);color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:18px 28px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--surf);flex-shrink:0}
.tbt{font-size:20px;font-weight:800}
.tbr{display:flex;align-items:center;gap:12px}
#si{display:none;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.tbm{font-size:11px;color:var(--mut);background:var(--surf2);padding:4px 10px;border-radius:20px;border:1px solid var(--bdr)}
.pc{padding:24px 28px;overflow-y:auto;flex:1}
/* KPI */
.kc{background:var(--surf);border:1.5px solid var(--bdr);border-radius:14px;padding:22px 18px 18px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer}
.ka{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r)}
.ch{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ct{font-size:15px;font-weight:800}
/* TABLE */
.tw{overflow-x:auto}
.tm{overflow-x:auto;overflow-y:hidden;height:10px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
.tm::-webkit-scrollbar{height:10px}
.tm::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.tm::-webkit-scrollbar-thumb:hover{background:var(--acc)}
.tw::-webkit-scrollbar{height:6px}
.tw::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr);background:var(--surf2);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(37,45,66,.5);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.018)}
tfoot td{background:var(--surf2);font-weight:700;border-top:2px solid var(--bdr2)}
/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:none;font-family:'Roboto Condensed',sans-serif;white-space:nowrap}
.btn:active{transform:scale(.97)}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc2)}
.bs{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr)}.bs:hover{border-color:var(--acc);color:var(--acc)}
.bg{background:var(--grn);color:#fff}
.bd{background:var(--red);color:#fff}
.bsm{padding:5px 11px;font-size:12px}
/* INPUT */
.inp{background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:10px 13px;color:var(--txt);font-family:'Roboto Condensed',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--acc)}
.insm{padding:7px 11px;font-size:12px;width:auto}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:76px;line-height:1.5}
.ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.mox{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:28px 32px;width:720px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.mt{font-size:19px;font-weight:800;margin-bottom:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.mac{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr)}
/* COMMENTS */
.cs{margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr)}
.cmt{background:var(--surf2);border-radius:8px;padding:11px 13px;margin-bottom:8px;border-left:3px solid var(--acc)}
.cma{font-size:11px;color:var(--mut);margin-bottom:3px}
.cmx{font-size:13px;line-height:1.5}
.cir{display:flex;gap:8px;margin-top:10px}
/* MISC */
.emp{text-align:center;padding:52px 20px;color:var(--mut)}
.ra{background:rgba(239,68,68,.12);color:#ef4444}
.rl{background:rgba(249,115,22,.12);color:#f97316}
.rt{background:rgba(59,130,246,.12);color:#3b82f6}
.rau{background:rgba(139,92,246,.12);color:#8b5cf6}
@keyframes pd{0%,100%{box-shadow:0 0 0 3px rgba(239,68,68,.25)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.08)}}
</style>
</head>

const GS_URL = 'https://script.google.com/macros/s/AKfycbxpu-cBEHy_1VZevh0Fx1_L1IXIKxeG1KhQvVh5TvpJh6pNAwElnhYITrE2p3Vrv4cr/exec';

// Salva localmente (sempre, para fallback offline)
function _saveLocal(){
  try{
    localStorage.setItem('pcm4_us', JSON.stringify(USERS));
    localStorage.setItem('pcm4_os', JSON.stringify(OS_DATA));
    localStorage.setItem('pcm4_eq', JSON.stringify(EQUIPAMENTOS));
    localStorage.setItem('pcm4_est',JSON.stringify(ESTOQUE));
    localStorage.setItem('pcm4_pm', JSON.stringify(PLANO_PREV));
    localStorage.setItem('pcm4_cu', JSON.stringify(CUSTOS_DATA));
    localStorage.setItem('pcm4_ts', Date.now().toString());
  }catch(e){}
}

// Lê do localStorage
function _loadLocal(){
  try{
    const pairs=[['pcm4_us',USERS],['pcm4_os',OS_DATA],['pcm4_eq',EQUIPAMENTOS],['pcm4_est',ESTOQUE],['pcm4_pm',PLANO_PREV],['pcm4_cu',CUSTOS_DATA]];
    pairs.forEach(([k,arr])=>{
      const raw=localStorage.getItem(k);
      if(raw){const p=JSON.parse(raw);if(Array.isArray(p)&&p.length>0)arr.splice(0,arr.length,...p);}
    });
  }catch(e){}
}

// Mostra indicador de sync
function _ind(txt,color,hide){
  const si=document.getElementById('si');if(!si)return;
  si.style.display='flex';si.textContent=txt;
  si.style.cssText+=`;background:${color}22;border-color:${color}55;color:${color};`;
  if(hide){clearTimeout(window._st);window._st=setTimeout(()=>{si.style.display='none';},2000);}
}

// Envia UMA aba para o Google Sheets
function _sendSheet(name, data){
  return fetch(GS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({sheet:name, rows:data})
  });
}

// saveAll — salva local E envia para Google Sheets
function saveAll(){
  _saveLocal();
  _ind('↻ Sincronizando...','#f97316',false);
  Promise.all([
    _sendSheet('USERS',       USERS),
    _sendSheet('OS_DATA',     OS_DATA),
    _sendSheet('EQUIPAMENTOS',EQUIPAMENTOS),
    _sendSheet('ESTOQUE',     ESTOQUE),
    _sendSheet('PLANO_PREV',  PLANO_PREV),
    _sendSheet('CUSTOS_DATA', CUSTOS_DATA),
  ]).then(()=>{ _ind('✓ Salvo','#22c55e',true); })
    .catch(()=>{ _ind('✓ Salvo (local)','#f59e0b',true); });
}

// Carrega dados do Google Sheets; fallback para localStorage
function loadSaved(){
  return fetch(GS_URL+'?t='+Date.now())
    .then(r=>r.json())
    .then(d=>{
      function pr(row){
        const r={...row};
        Object.keys(r).forEach(k=>{
          const v=r[k];
          if(typeof v==='string'){
            if(v==='true'){r[k]=true;return;}
            if(v==='false'){r[k]=false;return;}
            if(v!==''&&!isNaN(v)){r[k]=Number(v);return;}
            if((v.startsWith('[')||v.startsWith('{'))){try{r[k]=JSON.parse(v);}catch(e){}}
          }
        });
        return r;
      }
      const map=[['USERS',USERS],['OS_DATA',OS_DATA],['EQUIPAMENTOS',EQUIPAMENTOS],['ESTOQUE',ESTOQUE],['PLANO_PREV',PLANO_PREV],['CUSTOS_DATA',CUSTOS_DATA]];
      map.forEach(([k,arr])=>{
        if(d[k]&&Array.isArray(d[k])&&d[k].length>0){
          arr.splice(0,arr.length,...d[k].map(pr));
        }
      });
      _saveLocal(); // atualiza cache local
    })
    .catch(()=>{
      _loadLocal(); // usa cache local se Sheets falhar
    });
}

// Carrega imediatamente (síncrono do local para não travar)

const NAV=[{k:'dashboard',i:'🖥️',l:'Dashboard'},{k:'os',i:'🔧',l:'Ordens de Serviço'},{k:'equipamentos',i:'⚙️',l:'Equipamentos'},{k:'preventivo',i:'📅',l:'Plano Preventivo'},{k:'estoque',i:'📦',l:'Estoque'},{k:'custos',i:'💰',l:'Custos'},{k:'indicadores',i:'📊',l:'Indicadores KPI'},{k:'usuarios',i:'👥',l:'Usuários'}];

// ══ HELPERS ══
const R=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fR=v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
const isAdmin=()=>currentUser&&(currentUser.role==='administrador'||currentUser.role==='lider');
const isSA=()=>currentUser&&currentUser.role==='administrador';
function bdg(t,c){return `<span class="bdg" style="background:${c}22;color:${c}">${esc(t)}</span>`;}
function pcol(p){return {Alta:'#ef4444',Média:'#f59e0b',Baixa:'#22c55e',Planejada:'#3b82f6'}[p]||'#6b7a9b';}

function stcol(s){return {OK:'#22c55e','Ponto de Pedido':'#f59e0b','Abaixo do Mínimo':'#ef4444'}[s]||'#6b7a9b';}
function rname(r){return {administrador:'Administrador',lider:'Líder',tecnico:'Técnico',auxiliar:'Auxiliar'}[r]||r;}

// ══ AUTH ══
function ql(u,p){R('dom').value='PCM';R('usr').value=u;R('pwd').value=p;}
function doLogin(){
  const d=R('dom').value.trim().toUpperCase(),u=R('usr').value.trim(),p=R('pwd').value.trim(),err=R('lerr');
  if(d!=='PCM'){err.textContent='Domínio inválido.';err.classList.remove('hide');return;}
  err.classList.add('hide');
  const btn=R('lbtn');btn.textContent='Carregando...';btn.disabled=true;
  loadSaved().then(()=>{
    btn.textContent='Entrar no Sistema';btn.disabled=false;
    const user=USERS.find(x=>x.username===u&&x.password===p);
    if(!user){err.textContent='Usuário ou senha inválidos.';err.classList.remove('hide');return;}
    err.classList.add('hide');currentUser=user;
    R('ls').classList.add('hide');R('app').classList.remove('hide');
    buildSB();updUser();nav('dashboard');
    // Auto-sync a cada 30s
    window._syncInt=setInterval(()=>{
      loadSaved().then(()=>{ if(currentPage) nav(currentPage); });
    },30000);
  }).catch(()=>{
    btn.textContent='Entrar no Sistema';btn.disabled=false;
    const user=USERS.find(x=>x.username===u&&x.password===p);
    if(!user){err.textContent='Usuário ou senha inválidos.';err.classList.remove('hide');return;}
    err.classList.add('hide');currentUser=user;
    R('ls').classList.add('hide');R('app').classList.remove('hide');
    buildSB();updUser();nav('dashboard');
  });
}
function doLogout(){currentUser=null;clearInterval(window._syncInt);R('app').classList.add('hide');R('ls').classList.remove('hide');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!R('ls').classList.contains('hide'))doLogin();});

// ══ NAV ══
function buildSB(){
  const al=ACCESS[currentUser.role]||[];
  const sbnav=R('sbnav');sbnav.innerHTML='';
  NAV.filter(n=>al.includes(n.k)).forEach(n=>{
    const el=document.createElement('div');el.className='ni'+(n.k===currentPage?' active':'');
    el.dataset.k=n.k;el.innerHTML=`<span>${n.i}</span><span>${n.l}</span>`;
    el.onclick=()=>nav(n.k);sbnav.appendChild(el);
  });
}
function updUser(){
  R('uav').textContent=currentUser.name[0].toUpperCase();
  R('unm').textContent=currentUser.name;
  R('url').textContent=rname(currentUser.role)+' · '+currentUser.area;
}
function nav(page){
  Object.values(charts).forEach(ch=>{try{ch.destroy();}catch(e){}});charts={};
  currentPage=page;
  R('sbnav').querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.k===page));
  const item=NAV.find(n=>n.k===page);
  R('tbt').textContent=(item?.i||'')+' '+(item?.l||'');
  R('pc').innerHTML='';
  ({dashboard:rDash,os:rOS,equipamentos:rEQ,preventivo:rPM,estoque:rEST,custos:rCU,indicadores:rIND,usuarios:rUS}[page]||rDash)(R('pc'));
  setTimeout(applyDS,80);
}
function goOS(filter){
  osF.status=filter==='_atraso'?'Todos':filter;osF.tipo='Todos';osF.busca='';osF._atraso=filter==='_atraso';nav('os');
}

// ══ DUAL SCROLL ══
function applyDS(){
  document.querySelectorAll('.tw').forEach(w=>{
    if(w.dataset.ds)return;w.dataset.ds='1';
    const m=document.createElement('div');m.className='tm';
    const mi=document.createElement('div');mi.style.cssText='height:1px;display:block;';
    m.appendChild(mi);w.parentNode.insertBefore(m,w);
    function sw(){mi.style.width=w.scrollWidth+'px';}sw();
    let lm=false,lw=false;
    m.addEventListener('scroll',()=>{if(lw)return;lm=true;w.scrollLeft=m.scrollLeft;lm=false;});
    w.addEventListener('scroll',()=>{if(lm)return;lw=true;m.scrollLeft=w.scrollLeft;lw=false;});
    new ResizeObserver(sw).observe(w);
  });
}

// ══ CONFIRM DELETE ══
let _DEL=null;

function rd(yes){
  R('cov').style.display='none';
  if(yes&&_DEL){const fn=_DEL.fn;_DEL=null;fn();}
  else _DEL=null;
}

// ══ OS ══
let osF={busca:'',status:'Todos',tipo:'Todos',_atraso:false};
function rOS(c){
  c.innerHTML=`<div class="card"><div class="ch"><div class="ct">🔧 Ordens de Serviço</div><div class="ctl">
    <input class="inp insm" style="width:200px" placeholder="🔍 Buscar..." value="${esc(osF.busca)}" oninput="osF.busca=this.value;osF._atraso=false;rOST()">
    <select class="inp insm" onchange="osF.status=this.value;osF._atraso=false;rOST()">${['Todos','Concluída','Em Andamento','Aguardando','Emergência','Planejada'].map(s=>`<option${osF.status===s?' selected':''}>${s}</option>`).join('')}</select>
    <select class="inp insm" onchange="osF.tipo=this.value;rOST()">${['Todos','Corretiva','Preventiva','Preditiva','Melhoria'].map(t=>`<option${osF.tipo===t?' selected':''}>${t}</option>`).join('')}</select>
    ${osF._atraso?`<span style="background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:6px">⏰ Em Atraso <span onclick="osF._atraso=false;osF.status='Todos';rOS(R('pc'))" style="cursor:pointer;opacity:.7">✕</span></span>`:''}
    ${isAdmin()?`<button class="btn bp bsm" onclick="openNovOS()">➕ Nova OS</button>`:''}
  </div></div><div id="ostw"></div></div>`;
  rOST();
}
function rOST(){
  const b=osF.busca.toLowerCase(),hoje=new Date();hoje.setHours(0,0,0,0);
  const pd=s=>{if(!s)return null;const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);};
  const f=OS_DATA.filter(o=>{
    const s=(o.id+o.equipamento+o.area+o.executante+o.tag).toLowerCase().includes(b);
    const st=osF.status==='Todos'||o.status===osF.status;
    const tp=osF.tipo==='Todos'||o.tipo===osF.tipo;
    if(osF._atraso){const dp=pd(o.dataPrevista);return s&&tp&&o.status!=='Concluída'&&dp&&dp<hoje;}
    return s&&st&&tp;
  });
  const w=R('ostw');
  if(!f.length){w.innerHTML='<div class="emp"><div style="font-size:40px;margin-bottom:10px">🔍</div>Nenhuma OS encontrada</div>';return;}
  const rows=f.map(o=>`<tr>
    <td><strong style="color:var(--acc);font-size:13px;font-weight:800">${esc(o.id)}</strong></td>
    <td>${bdg(o.tipo,'#6b7a9b')}</td><td>${bdg(o.prioridade,pcol(o.prioridade))}</td>
    <td>${esc(o.equipamento)}</td><td style="color:var(--mut);font-size:12px">${esc(o.tag)}</td>
    <td>${esc(o.area)}</td><td>${esc(o.executante)}</td>
    <td style="color:var(--mut);font-size:12px">${esc(o.dataAbertura)}</td>

function rPM(c){
  const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mTh=ms.map(m=>`<th style="text-align:center;padding:10px 8px">${m}</th>`).join('');
  const rows=PLANO_PREV.map((p,idx)=>{
    const mCols=p.m.map((v,mi)=>isAdmin()?`<td style="text-align:center;font-size:15px;cursor:pointer" onclick="togPM(${idx},${mi})">${v==='✅'?'✅':v==='📋'?'<span style="opacity:.65">📋</span>':'<span style="color:var(--bdr2)">·</span>'}</td>`:`<td style="text-align:center;font-size:15px">${v==='✅'?'✅':v==='📋'?'<span style="opacity:.65">📋</span>':'<span style="color:var(--bdr2)">·</span>'}</td>`).join('');
    return `<tr><td>${esc(p.eq)}</td><td style="color:var(--mut);font-size:12px">${esc(p.tag)}</td><td>${esc(p.area)}</td><td>${bdg(p.freq,'#3b82f6')}</td><td>${esc(p.resp)}</td>${mCols}<td style="text-align:center;font-weight:700">${p.hh}h</td><td style="font-weight:700;color:var(--acc)">${fR(p.custo)}</td>${isAdmin()?`<td><button class="btn bs bsm" onclick="openEditPM(${idx})">✏️ Editar</button></td>`:'<td></td>'}</tr>`;
  }).join('');
  c.innerHTML=`<div class="card"><div class="ch"><div class="ct">📅 Plano Mestre de Manutenção Preventiva</div><div class="ctl">
    <span style="font-size:12px;color:var(--mut)">✅ Concluída &nbsp; 📋 Programada${isAdmin()?' · Clique nas células para alternar':''}</span>
    ${isAdmin()?`<button class="btn bp bsm" onclick="openNovPM()">➕ Novo Item</button>`:''}
  </div></div>
  <div class="tw"><table><thead><tr><th>Equipamento</th><th>TAG</th><th>Área</th><th>Freq.</th><th>Responsável</th>${mTh}<th style="text-align:center">HH/Exec.</th><th>Custo Est.</th>${isAdmin()?'<th>Ações</th>':''}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
  setTimeout(applyDS,30);
}
function togPM(idx,mi){const v=['','✅','📋'];const c=v.indexOf(PLANO_PREV[idx].m[mi]);PLANO_PREV[idx].m[mi]=v[(c+1)%3];saveAll();rPM(R('pc'));}
function pmForm(p){
  const fo=['Diária','Semanal','Quinzenal','Mensal','Bimestral','Trimestral','Semestral','Anual'].map(f=>`<option${p&&p.freq===f?' selected':''}>${f}</option>`).join('');
  return `<div class="fg2"><div class="fg"><label>Equipamento *</label><input class="inp" id="pm-eq" value="${esc(p?p.eq:'')}"></div><div class="fg"><label>TAG</label><input class="inp" id="pm-tag" value="${esc(p?p.tag:'')}"></div><div class="fg"><label>Área</label><input class="inp" id="pm-ar" value="${esc(p?p.area:'')}"></div><div class="fg"><label>Frequência</label><select class="inp" id="pm-freq">${fo}</select></div><div class="fg"><label>Responsável</label><input class="inp" id="pm-resp" value="${esc(p?p.resp:'')}"></div><div class="fg"><label>HH por Execução</label><input class="inp" type="number" id="pm-hh" value="${p?p.hh:4}"></div><div class="fg"><label>Custo Estimado (R$)</label><input class="inp" type="number" id="pm-custo" value="${p?p.custo:0}"></div></div>`;
}
function _cPM(){return {eq:R('pm-eq').value.trim(),tag:R('pm-tag').value.trim(),area:R('pm-ar').value.trim(),freq:R('pm-freq').value,resp:R('pm-resp').value.trim(),hh:parseFloat(R('pm-hh').value)||4,custo:parseFloat(R('pm-custo').value)||0,m:['','','','','','','','','','','','']};}
function openNovPM(){sm(`<div class="mt">➕ Novo Item — Plano Preventivo</div>${pmForm(null)}<div class="mac"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svNovPM()">✅ Adicionar</button></div>`);}
function svNovPM(){const p=_cPM();if(!p.eq){alert('Informe o equipamento');return;}PLANO_PREV.push(p);saveAll();cm();rPM(R('pc'));}
function openEditPM(idx){
  const p=PLANO_PREV[idx];
  sm(`<div class="mt">✏️ Editar Plano — ${esc(p.eq)}</div>${pmForm(p)}
    <div class="mac" style="justify-content:space-between">
      <button class="btn bd" onclick="askDel('${esc(p.eq)} do plano preventivo',function(){PLANO_PREV.splice(${idx},1);saveAll();cm();rPM(R('pc'));})">🗑️ Apagar</button>
      <div style="display:flex;gap:10px"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEditPM(${idx})">💾 Salvar</button></div>
    </div>`);
}
function svEditPM(idx){const p=_cPM();if(!p.eq){alert('Informe o equipamento');return;}p.m=PLANO_PREV[idx].m;Object.assign(PLANO_PREV[idx],p);saveAll();cm();rPM(R('pc'));}


// ══ ESTOQUE ══
let estF={busca:'',cat:'Todos',status:'Todos'};
function rEST(c){
  const cats=['Todos',...new Set(ESTOQUE.map(e=>e.cat))];
  const tv=ESTOQUE.reduce((a,e)=>a+e.qtd*e.vlr,0);
  const abx=ESTOQUE.filter(e=>e.qtd<e.min);
  const okC=ESTOQUE.filter(e=>e.qtd>e.ped).length;
  const alertBanner=abx.length?`<div style="background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.35);border-radius:12px;padding:16px 20px;margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:22px">🚨</span><div><div style="font-size:15px;font-weight:800;color:#ef4444">Alerta — ${abx.length} item(ns) abaixo do mínimo</div></div></div>
    ${abx.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:12px"><span style="font-weight:700;color:#ef4444">${esc(e.cod)}</span><span>${esc(e.desc)}</span></div>
      <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
        <div style="text-align:center"><div style="font-size:10px;color:var(--mut)">Atual</div><div style="font-size:18px;font-weight:800;color:#ef4444">${e.qtd} ${esc(e.un)}</div></div>
        <div style="text-align:center"><div style="font-size:10px;color:var(--mut)">Mínimo</div><div style="font-size:18px;font-weight:800;color:var(--mut2)">${e.min} ${esc(e.un)}</div></div>
        <div style="text-align:center"><div style="font-size:10px;color:var(--mut)">Faltam</div><div style="font-size:18px;font-weight:800;color:#f59e0b">${e.min-e.qtd} ${esc(e.un)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--mut)">Fornecedor</div><div style="font-size:12px;font-weight:600">${esc(e.forn)||'—'}</div><div style="font-size:11px;color:var(--mut)">Lead: ${e.lead}d</div></div>
      </div></div>`).join('')}
  </div>`:'';
  c.innerHTML=`${alertBanner}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px">
      <div class="kc" style="cursor:default"><div class="ka" style="background:#f97316"></div><div style="font-size:20px;margin-bottom:8px">📦</div><div style="font-size:26px;font-weight:800;color:#f97316">${ESTOQUE.length}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">Itens Cadastrados</div></div>
      <div class="kc" style="cursor:default"><div class="ka" style="background:#ef4444"></div><div style="font-size:20px;margin-bottom:8px">🚨</div><div style="font-size:26px;font-weight:800;color:#ef4444">${abx.length}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">Abaixo do Mínimo</div></div>
      <div class="kc" style="cursor:default"><div class="ka" style="background:#22c55e"></div><div style="font-size:20px;margin-bottom:8px">✅</div><div style="font-size:26px;font-weight:800;color:#22c55e">${okC}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">Em Nível OK</div></div>
      <div class="kc" style="cursor:default"><div class="ka" style="background:#22c55e"></div><div style="font-size:20px;margin-bottom:8px">💰</div><div style="font-size:20px;font-weight:800;color:#22c55e">${fR(tv)}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">Valor Total</div></div>
    </div>
    <div class="card"><div class="ch"><div class="ct">📦 Almoxarifado</div><div class="ctl">
      <input class="inp insm" style="width:200px" placeholder="🔍 Buscar..." value="${esc(estF.busca)}" oninput="estF.busca=this.value;rESTT()">
      <select class="inp insm" onchange="estF.cat=this.value;rESTT()">${cats.map(x=>`<option${estF.cat===x?' selected':''}>${x}</option>`).join('')}</select>
      <select class="inp insm" onchange="estF.status=this.value;rESTT()"><option value="Todos">Todos</option><option value="Abaixo do Mínimo">🔴 Abaixo Mínimo</option><option value="Ponto de Pedido">🟡 Pto. Pedido</option><option value="OK">🟢 OK</option></select>
      ${isAdmin()?`<button class="btn bp bsm" onclick="openNovEST()">➕ Novo Item</button>`:''}
    </div></div><div id="esttw"></div></div>`;
  rESTT();
}
function rESTT(){
  const b=estF.busca.toLowerCase();
  const f=ESTOQUE.filter(e=>(e.cod+e.desc).toLowerCase().includes(b)&&(estF.cat==='Todos'||e.cat===estF.cat)&&(estF.status==='Todos'||e.st===estF.status));
  const w=R('esttw');
  if(!f.length){w.innerHTML='<div class="emp"><div style="font-size:40px;margin-bottom:10px">📦</div>Nenhum item encontrado</div>';return;}
  const rows=f.map(e=>{const al=e.qtd<e.min;const idx=ESTOQUE.indexOf(e);return`<tr style="${al?'background:rgba(239,68,68,.04)':''}">
    <td><strong style="color:var(--acc);font-weight:800">${esc(e.cod)}</strong></td>
    <td>${esc(e.desc)}${al?'<span style="display:inline-flex;align-items:center;margin-left:6px;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,.15);color:#ef4444">⚠ MÍNIMO</span>':''}</td>
    <td>${esc(e.cat)}</td><td style="color:var(--mut)">${esc(e.un)}</td>
    <td style="font-size:15px;font-weight:800;text-align:center;color:${al?'#ef4444':'var(--txt)'}">${e.qtd}</td>
    <td style="font-size:13px;font-weight:600;text-align:center;color:${al?'#ef4444':'var(--mut)'}">${e.min}</td>
    <td style="font-size:13px;text-align:center;color:var(--mut)">${e.ped}</td>
    <td style="font-weight:600;text-align:right">${fR(e.vlr)}</td>
    <td style="font-weight:800;text-align:right;color:var(--acc2)">${fR(e.qtd*e.vlr)}</td>
    <td>${esc(e.forn)}</td><td style="font-weight:600;text-align:center">${e.lead}d</td>
    <td>${bdg(e.st,stcol(e.st))}</td>
    ${isAdmin()?`<td><button class="btn bs bsm" onclick="openEditEST(${idx})">✏️ Editar</button></td>`:'<td></td>'}
  </tr>`;}).join('');
  w.innerHTML=`<div class="tw"><table><thead><tr><th>Código</th><th>Descrição</th><th>Categoria</th><th>Un.</th><th>Qtd. Atual</th><th>Qtd. Mín.</th><th>Pto. Pedido</th><th style="text-align:right">Vlr. Unit.</th><th style="text-align:right">Vlr. Total</th><th>Fornecedor</th><th>Lead</th><th>Status</th>${isAdmin()?'<th>Ações</th>':''}</tr></thead><tbody>${rows}</tbody></table></div>`;
  setTimeout(applyDS,30);
}
function estForm(e){
  return `<div class="fg2">
    <div class="fg"><label>Código *</label><input class="inp" id="it-cod" value="${esc(e?e.cod:'')}"></div>
    <div class="fg"><label>Descrição *</label><input class="inp" id="it-desc" value="${esc(e?e.desc:'')}"></div>
    <div class="fg"><label>Categoria</label><input class="inp" id="it-cat" value="${esc(e?e.cat:'')}"></div>
    <div class="fg"><label>Unidade</label><input class="inp" id="it-un" value="${esc(e?e.un:'Pç')}"></div>
    <div class="fg"><label>Qtd. Atual *</label><input class="inp" type="number" id="it-qtd" value="${e?e.qtd:0}" oninput="calcST()"></div>
    <div class="fg"><label>Qtd. Mínima</label><input class="inp" type="number" id="it-min" value="${e?e.min:0}" oninput="calcST()"></div>
    <div class="fg"><label>Qtd. Máxima</label><input class="inp" type="number" id="it-max" value="${e?e.max:0}"></div>
    <div class="fg"><label>Ponto de Pedido</label><input class="inp" type="number" id="it-ped" value="${e?e.ped:0}" oninput="calcST()"></div>
    <div class="fg"><label>Valor Unitário (R$)</label><input class="inp" type="number" step="0.01" id="it-vlr" value="${e?e.vlr:0}"></div>
    <div class="fg"><label>Fornecedor</label><input class="inp" id="it-forn" value="${esc(e?e.forn:'')}"></div>
    <div class="fg"><label>Lead Time (dias)</label><input class="inp" type="number" id="it-lead" value="${e?e.lead:7}"></div>
    <div class="fg"><label>Status</label><div id="it-stprev" style="padding:9px 13px;border-radius:var(--r2);font-size:13px;font-weight:700;background:var(--surf2);border:1.5px solid var(--bdr)">—</div><input type="hidden" id="it-st" value="${e?e.st:'OK'}"></div>
  </div>`;
}
function calcST(){
  const q=parseInt(R('it-qtd')?.value)||0,mn=parseInt(R('it-min')?.value)||0,pd=parseInt(R('it-ped')?.value)||0;
  let st='OK',c='#22c55e';
  if(q<mn){st='Abaixo do Mínimo';c='#ef4444';}else if(q<=pd){st='Ponto de Pedido';c='#f59e0b';}
  const pr=R('it-stprev');if(pr){pr.textContent=st;pr.style.color=c;pr.style.borderColor=c+'55';}
  const inp=R('it-st');if(inp)inp.value=st;
}
function _cEST(){const q=parseInt(R('it-qtd').value)||0,mn=parseInt(R('it-min').value)||0,pd=parseInt(R('it-ped').value)||0;let st='OK';if(q<mn)st='Abaixo do Mínimo';else if(q<=pd)st='Ponto de Pedido';return {cod:R('it-cod').value.trim(),desc:R('it-desc').value.trim(),cat:R('it-cat').value.trim(),un:R('it-un').value.trim(),qtd:q,min:mn,max:parseInt(R('it-max').value)||0,ped:pd,vlr:parseFloat(R('it-vlr').value)||0,forn:R('it-forn').value.trim(),lead:parseInt(R('it-lead').value)||7,st};}
function openNovEST(){sm(`<div class="mt">➕ Novo Item de Estoque</div>${estForm(null)}<div class="mac"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svNovEST()">✅ Cadastrar</button></div>`);setTimeout(calcST,50);}
function svNovEST(){const e=_cEST();if(!e.cod||!e.desc){alert('Código e Descrição obrigatórios');return;}ESTOQUE.push(e);saveAll();cm();rEST(R('pc'));}
function openEditEST(idx){
  const e=ESTOQUE[idx];
  sm(`<div class="mt">✏️ Editar Item — ${esc(e.cod)}</div>${estForm(e)}
    <div class="mac" style="justify-content:space-between">
      <button class="btn bd" onclick="askDel('${esc(e.cod)} — ${esc(e.desc)}',function(){ESTOQUE.splice(${idx},1);saveAll();cm();rEST(R('pc'));})">🗑️ Apagar</button>
      <div style="display:flex;gap:10px"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEditEST(${idx})">💾 Salvar</button></div>
    </div>`);
  setTimeout(calcST,50);
}
function svEditEST(idx){const e=_cEST();if(!e.cod||!e.desc){alert('Código e Descrição obrigatórios');return;}Object.assign(ESTOQUE[idx],e);saveAll();cm();rEST(R('pc'));}

// ══ CUSTOS ══
function rCU(c){
  const sm2=f=>CUSTOS_DATA.reduce((a,x)=>a+x[f],0);
  const tMO=sm2('mo'),tMat=sm2('mat'),tTerc=sm2('terc'),tOut=sm2('outros'),tG=sm2('total'),tOrc=sm2('orc');
  const kCards=[{i:'👷',l:'Mão de Obra',v:tMO,c:'#f97316'},{i:'🔩',l:'Materiais',v:tMat,c:'#3b82f6'},{i:'🏢',l:'Terceiros',v:tTerc,c:'#8b5cf6'},{i:'💰',l:'Total Gasto',v:tG,c:'#22c55e'},{i:'📊',l:'Orçamento',v:tOrc,c:'#f59e0b'}].map(k=>`<div class="kc" style="cursor:default"><div class="ka" style="background:${k.c}"></div><div style="font-size:20px;margin-bottom:8px">${k.i}</div><div style="font-size:17px;font-weight:800;color:${k.c}">${fR(k.v)}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">${k.l}</div></div>`).join('');
  const rows=CUSTOS_DATA.map((x,i)=>`<tr>
    <td><strong style="color:var(--acc)">${esc(x.os)}</strong></td><td>${esc(x.eq)}</td><td>${esc(x.area)}</td>
    <td>${bdg(x.tipo,'#6b7a9b')}</td><td>${fR(x.mo)}</td><td>${fR(x.mat)}</td>
    <td>${fR(x.terc)}</td><td>${fR(x.outros)}</td><td><strong>${fR(x.total)}</strong></td>
    <td>${fR(x.orc)}</td><td style="color:${x.total<=x.orc?'#22c55e':'#ef4444'};font-weight:700">${fR(x.orc-x.total)}</td>
    <td>${bdg(x.total<=x.orc?'Dentro':'Estourado',x.total<=x.orc?'#22c55e':'#ef4444')}</td>
    ${isAdmin()?`<td><button class="btn bs bsm" onclick="openEditCU(${i})">✏️ Editar</button></td>`:'<td></td>'}
  </tr>`).join('');
  c.innerHTML=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px">${kCards}</div>
    <div class="card"><div class="ch"><div class="ct">💰 Controle de Custos por OS</div>${isAdmin()?`<button class="btn bp bsm" onclick="openNovCU()">➕ Novo</button>`:''}</div>
    <div class="tw"><table><thead><tr><th>Nº OS</th><th>Equipamento</th><th>Área</th><th>Tipo</th><th>Mão de Obra</th><th>Material</th><th>Terceiros</th><th>Outros</th><th>Total</th><th>Orçamento</th><th>Diferença</th><th>Status</th>${isAdmin()?'<th>Ações</th>':''}</tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="4"><strong>TOTAIS</strong></td><td>${fR(tMO)}</td><td>${fR(tMat)}</td><td>${fR(tTerc)}</td><td>${fR(tOut)}</td><td style="color:var(--acc)">${fR(tG)}</td><td>${fR(tOrc)}</td><td style="color:#22c55e">${fR(tOrc-tG)}</td><td></td>${isAdmin()?'<td></td>':''}</tr></tfoot>
    </table></div></div>`;
  setTimeout(applyDS,30);
}
function cuForm(x){
  const tp=['Corretiva','Preventiva','Preditiva','Melhoria'].map(t=>`<option${x&&x.tipo===t?' selected':''}>${t}</option>`).join('');
  return `<div class="fg2"><div class="fg"><label>Nº OS *</label><input class="inp" id="cu-os" value="${esc(x?x.os:'')}"></div><div class="fg"><label>Equipamento</label><input class="inp" id="cu-eq" value="${esc(x?x.eq:'')}"></div><div class="fg"><label>Área</label><input class="inp" id="cu-ar" value="${esc(x?x.area:'')}"></div><div class="fg"><label>Tipo</label><select class="inp" id="cu-tp">${tp}</select></div><div class="fg"><label>Mão de Obra (R$)</label><input class="inp" type="number" step="0.01" id="cu-mo" value="${x?x.mo:0}"></div><div class="fg"><label>Material (R$)</label><input class="inp" type="number" step="0.01" id="cu-mat" value="${x?x.mat:0}"></div><div class="fg"><label>Terceiros (R$)</label><input class="inp" type="number" step="0.01" id="cu-terc" value="${x?x.terc:0}"></div><div class="fg"><label>Outros (R$)</label><input class="inp" type="number" step="0.01" id="cu-out" value="${x?x.outros:0}"></div><div class="fg"><label>Orçamento (R$)</label><input class="inp" type="number" step="0.01" id="cu-orc" value="${x?x.orc:0}"></div></div>`;

function _cCU(){const mo=parseFloat(R('cu-mo').value)||0,mat=parseFloat(R('cu-mat').value)||0,terc=parseFloat(R('cu-terc').value)||0,outros=parseFloat(R('cu-out').value)||0;return {os:R('cu-os').value.trim(),eq:R('cu-eq').value.trim(),area:R('cu-ar').value.trim(),tipo:R('cu-tp').value,mo,mat,terc,outros,total:mo+mat+terc+outros,orc:parseFloat(R('cu-orc').value)||0};}
function openNovCU(){sm(`<div class="mt">➕ Novo Registro de Custo</div>${cuForm(null)}<div class="mac"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svNovCU()">✅ Registrar</button></div>`);}
function svNovCU(){const x=_cCU();if(!x.os){alert('Nº da OS obrigatório');return;}CUSTOS_DATA.push(x);saveAll();cm();rCU(R('pc'));}
function openEditCU(idx){

    <div class="mac" style="justify-content:space-between">

function svEditCU(idx){const x=_cCU();if(!x.os){alert('Nº da OS obrigatório');return;}Object.assign(CUSTOS_DATA[idx],x);saveAll();cm();rCU(R('pc'));}

// ══ INDICADORES ══
function rIND(c){
  const kpis=[{i:'🛑',v:'42%',l:'OS Corretivas',meta:'Meta: ≤30%',ok:false},{i:'✅',v:'33%',l:'OS Preventivas',meta:'Meta: ≥40%',ok:false},{i:'📡',v:'17%',l:'OS Preditivas',meta:'Meta: ≥20%',ok:false},{i:'⚡',v:'93.5%',l:'Disponibilidade',meta:'Meta: ≥95%',ok:false},{i:'📋',v:'7',l:'Backlog OS',meta:'Meta: ≤15',ok:true},{i:'⏱️',v:'312h',l:'MTBF',meta:'Meta: ≥300h',ok:true},{i:'🔧',v:'3.8h',l:'MTTR',meta:'Meta: ≤4h',ok:true},{i:'📈',v:'96%',l:'Eficiência PCM',meta:'Meta: ≥90%',ok:true},{i:'💰',v:'4.3%',l:'Custo/Fat.',meta:'Meta: ≤4%',ok:false},{i:'⚠️',v:'80%',l:'Aderência PM',meta:'Meta: ≥90%',ok:false}];
  const kCards=kpis.map(k=>`<div class="kc" style="cursor:default"><div class="ka" style="background:${k.ok?'#22c55e':'#ef4444'}"></div><div style="font-size:20px;margin-bottom:8px">${k.i}</div><div style="font-size:22px;font-weight:800;color:${k.ok?'#22c55e':'#ef4444'}">${k.v}</div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;margin-top:4px">${k.l}</div><div style="font-size:10px;color:var(--mut);margin-top:4px">${k.meta}</div><div style="margin-top:8px">${bdg(k.ok?'✅ Meta OK':'⚠️ Abaixo',k.ok?'#22c55e':'#ef4444')}</div></div>`).join('');
  const mRows=[{mes:'Janeiro',ab:28,co:25,cr:12,pr:10,pd:3,hp:180,hr:190,ef:94.7,di:95.2,mtbf:320,mttr:3.5,cu:48500,ad:82},{mes:'Fevereiro',ab:32,co:30,cr:14,pr:12,pd:4,hp:200,hr:205,ef:97.6,di:94.8,mtbf:305,mttr:4.1,cu:52300,ad:78}].map(m=>`<tr><td><strong>${m.mes}</strong></td><td>${m.ab}</td><td>${m.co}</td><td style="color:#ef4444;font-weight:700">${m.cr}</td><td style="color:#22c55e;font-weight:700">${m.pr}</td><td style="color:#3b82f6;font-weight:700">${m.pd}</td><td>${m.hp}h</td><td>${m.hr}h</td><td>${bdg(m.ef+'%',m.ef>=90?'#22c55e':'#f59e0b')}</td><td>${bdg(m.di+'%',m.di>=95?'#22c55e':'#ef4444')}</td><td>${m.mtbf}h</td><td>${m.mttr}h</td><td style="color:var(--acc);font-weight:700">${fR(m.cu)}</td><td>${bdg(m.ad+'%',m.ad>=90?'#22c55e':'#f59e0b')}</td></tr>`).join('');
  c.innerHTML=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px">${kCards}</div>
    <div class="card"><div class="ch"><div class="ct">📊 Evolução Mensal dos Indicadores</div></div>
    <div class="tw"><table><thead><tr><th>Mês</th><th>OS Abertas</th><th>OS Conc.</th><th>Corretivas</th><th>Preventivas</th><th>Preditivas</th><th>HH Prev.</th><th>HH Real</th><th>Efic.%</th><th>Disp.%</th><th>MTBF</th><th>MTTR</th><th>Custo Total</th><th>Ader. PM%</th></tr></thead><tbody>${mRows}</tbody></table></div></div>`;
  setTimeout(applyDS,30);
}

// ══ USUÁRIOS ══
function rUS(c){
  if(!isSA()){c.innerHTML='<div class="emp"><div style="font-size:40px;margin-bottom:10px">🔒</div>Acesso restrito ao Administrador</div>';return;}
  const rows=USERS.map((u,i)=>`<tr>
    <td>${u.id}</td><td><strong>${esc(u.name)}</strong></td>
    <td style="color:var(--mut)">${esc(u.username)}</td>
    <td>${'•'.repeat(Math.min(u.password.length,8))}</td>
    <td><span class="bdg r${u.role.slice(0,1)+u.role.slice(u.role==='administrador'?0:0)}" style="background:var(--surf2)">${rname(u.role)}</span></td>
    <td>${esc(u.area)}</td>
    <td><button class="btn bs bsm" onclick="openEditUS(${i})">✏️ Editar</button></td>
  </tr>`).join('');
  c.innerHTML=`<div class="card"><div class="ch"><div class="ct">👥 Gerenciamento de Usuários</div><button class="btn bp bsm" onclick="openNovUS()">➕ Novo Usuário</button></div>
    <div class="tw"><table><thead><tr><th>#</th><th>Nome</th><th>Usuário</th><th>Senha</th><th>Perfil</th><th>Área</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  setTimeout(applyDS,30);
}
function usForm(u){
  const ro=['administrador','lider','tecnico','auxiliar'].map(r=>`<option value="${r}"${u&&u.role===r?' selected':''}>${rname(r)}</option>`).join('');
  return `<div class="fg2"><div class="fg full"><label>Nome Completo *</label><input class="inp" id="us-nm" value="${esc(u?u.name:'')}"></div><div class="fg"><label>Login *</label><input class="inp" id="us-lg" value="${esc(u?u.username:'')}"${u&&u.username==='admin'?' readonly':''}></div><div class="fg"><label>Senha *</label><input class="inp" id="us-pw" value="${esc(u?u.password:'')}"></div><div class="fg"><label>Perfil</label><select class="inp" id="us-ro">${ro}</select></div><div class="fg"><label>Área/Setor</label><input class="inp" id="us-ar" value="${esc(u?u.area:'')}"></div></div>`;
}
function _cUS(){return {name:R('us-nm').value.trim(),username:R('us-lg').value.trim().toLowerCase(),password:R('us-pw').value.trim(),role:R('us-ro').value,area:R('us-ar').value.trim()};}
function openNovUS(){sm(`<div class="mt">➕ Novo Usuário</div>${usForm(null)}<div class="mac"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svNovUS()">✅ Criar</button></div>`);}
function svNovUS(){const u=_cUS();if(!u.name||!u.username||!u.password){alert('Nome, usuário e senha obrigatórios');return;}if(USERS.find(x=>x.username===u.username)){alert('Usuário já existe');return;}u.id=Math.max(...USERS.map(x=>x.id))+1;USERS.push(u);saveAll();cm();rUS(R('pc'));}
function openEditUS(idx){
  const u=USERS[idx];
  sm(`<div class="mt">✏️ Editar Usuário — ${esc(u.name)}</div>${usForm(u)}
    <div class="mac" style="justify-content:space-between">
      ${u.username!=='admin'?`<button class="btn bd" onclick="askDel('Usuário ${esc(u.name)} (${esc(u.username)})',function(){USERS.splice(${idx},1);saveAll();cm();rUS(R('pc'));})">🗑️ Apagar</button>`:'<span></span>'}
      <div style="display:flex;gap:10px"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEditUS(${idx})">💾 Salvar</button></div>
    </div>`);
}
function svEditUS(idx){const u=_cUS();if(!u.name||!u.username||!u.password){alert('Nome, usuário e senha obrigatórios');return;}if(USERS.find((x,i)=>x.username===u.username&&i!==idx)){alert('Usuário já existe');return;}Object.assign(USERS[idx],u);if(currentUser&&currentUser.id===USERS[idx].id)currentUser=USERS[idx];saveAll();cm();rUS(R('pc'));}

</script>
