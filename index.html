<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PCM — Controle de Manutenção</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--surf:#ffffff;--surf2:#e8ecf4;--bdr:#d0d7e8;--bdr2:#b8c2d8;
  --acc:#f97316;--acc2:#ea6c0a;--accD:rgba(249,115,22,.1);
  --txt:#1a2340;--mut:#6b7a9b;--mut2:#8a9ab8;
  --red:#ef4444;--grn:#22c55e;--ylw:#f59e0b;--blu:#3b82f6;--pur:#8b5cf6;--pnk:#c026d3;
  --navy:#0f1f45;--navy2:#162455;--navy3:#1e2f66;--navy-bdr:#2a3f80;--navy-txt:#c8d4f0;--navy-mut:#7a90c0;
  --r:10px;--r2:8px
}
body{background:var(--bg);color:var(--txt);font-family:'Roboto Condensed',sans-serif;min-height:100vh;font-size:14px}
.hide{display:none!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surf2)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}
/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1f45 0%,#162455 50%,#1e3a6e 100%);position:relative;overflow:hidden}
#ls::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% -10%,rgba(249,115,22,.22),transparent)}
.lc{position:relative;z-index:1;background:#fff;border:1px solid #d0d7e8;border-radius:18px;padding:48px 44px;width:420px;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.lb-title{font-size:26px;font-weight:800;color:var(--acc)}
.lb-sub{font-size:12px;color:var(--mut);margin-bottom:32px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.fld input{width:100%;background:#f0f2f7;border:1.5px solid var(--bdr);border-radius:var(--r2);padding:11px 14px;color:var(--txt);font-family:'Roboto Condensed',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fld input:focus{border-color:var(--acc)}
#lbtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-family:'Roboto Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s}
#lbtn:hover{background:var(--acc2)}
#lerr{color:var(--red);font-size:12px;text-align:center;margin-top:8px;padding:8px;background:rgba(239,68,68,.08);border-radius:6px}
.dbox{margin-top:20px;background:#f0f2f7;border:1px solid var(--bdr);border-radius:10px;padding:14px}
.dt{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.dr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-size:12px;color:var(--mut)}
.dbs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.db{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;background:transparent}
/* APP */
#app{display:flex;min-height:100vh}
.sb{width:240px;background:var(--navy);border-right:1px solid var(--navy-bdr);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--navy-bdr)}
.sb-logo{height:32px;object-fit:contain;display:block;margin-bottom:6px;max-width:100%}
.b-title{font-size:18px;font-weight:800;color:var(--acc)}
.b-sub{font-size:10px;color:var(--navy-mut);margin-top:2px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--navy-mut);transition:all .15s;margin-bottom:3px;font-size:13px;font-weight:600;user-select:none}
.ni:hover{background:var(--navy3);color:var(--navy-txt)}
.ni.active{background:rgba(249,115,22,.18);color:var(--acc);border-left:3px solid var(--acc)}
.sb-foot{padding:14px;border-top:1px solid var(--navy-bdr)}
.ub{background:var(--navy2);border-radius:8px;padding:12px;border:1px solid var(--navy-bdr)}
.uav{width:36px;height:36px;border-radius:50%;background:rgba(249,115,22,.2);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--acc);flex-shrink:0}
.unm{font-size:13px;font-weight:700;color:var(--navy-txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.url{font-size:11px;color:var(--navy-mut);margin-top:1px}
.ur{display:flex;align-items:center;gap:10px}
.lout{width:100%;background:transparent;border:1px solid var(--navy-bdr);color:var(--navy-mut);border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .15s;font-family:'Roboto Condensed',sans-serif}
.lout:hover{border-color:#ef4444;color:#ef4444}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--navy);flex-shrink:0;box-shadow:2px 0 12px rgba(0,0,0,.1)}
.tbt{font-size:20px;font-weight:800;color:#fff}
.tbr{display:flex;align-items:center;gap:12px}
#si{display:none;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.tbm{font-size:11px;color:var(--navy-txt);background:var(--navy2);padding:4px 12px;border-radius:20px;border:1px solid var(--navy-bdr)}
.pc{padding:24px 28px;overflow-y:auto;flex:1;background:var(--bg)}
/* KPI */
.kc{background:#fff;border-color:var(--bdr);box-shadow:0 2px 8px rgba(0,0,0,.06);border:1.5px solid var(--bdr);border-radius:14px;padding:22px 18px 18px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer}
.ka{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
/* CARD */
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ch{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#fff;border-radius:var(--r) var(--r) 0 0}
.ct{font-size:15px;font-weight:800}
/* TABLE */
.tw{overflow-x:auto}
.tm{overflow-x:auto;overflow-y:hidden;height:10px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
.tm::-webkit-scrollbar{height:10px}
.tm::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.tm::-webkit-scrollbar-thumb:hover{background:var(--acc)}
.tw::-webkit-scrollbar{height:6px}
.tw::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--navy-bdr);background:var(--navy2);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--bdr);white-space:nowrap;color:var(--txt)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f0f4ff}
tfoot td{background:var(--surf2);font-weight:700;border-top:2px solid var(--bdr2);color:var(--txt)}
/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:none;font-family:'Roboto Condensed',sans-serif;white-space:nowrap}
.btn:active{transform:scale(.97)}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc2)}
.bs{background:#f0f2f7;color:var(--txt);border:1px solid var(--bdr)}.bs:hover{border-color:var(--acc);color:var(--acc)}
.bg{background:var(--grn);color:#fff}
.bd{background:var(--red);color:#fff}
.bsm{padding:5px 11px;font-size:12px}
/* INPUT */
.inp{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r2);padding:10px 13px;color:var(--txt);font-family:'Roboto Condensed',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--acc)}
.insm{padding:7px 11px;font-size:12px;width:auto}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:76px;line-height:1.5}
.ctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(15,31,69,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.mox{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:28px 32px;width:720px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.2)}
.mt{font-size:19px;font-weight:800;margin-bottom:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.mac{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr)}
/* COMMENTS */
.cs{margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr)}
.cmt{background:#f0f4ff;border-radius:8px;padding:11px 13px;margin-bottom:8px;border-left:3px solid var(--acc)}
.cma{font-size:11px;color:var(--mut);margin-bottom:3px}
.cmx{font-size:13px;line-height:1.5}
.cir{display:flex;gap:8px;margin-top:10px}
/* MISC */
.emp{text-align:center;padding:52px 20px;color:var(--mut)}
.ra{background:rgba(239,68,68,.1);color:#dc2626}
.rl{background:rgba(249,115,22,.1);color:#ea6c0a}
.rt{background:rgba(59,130,246,.1);color:#2563eb}
.rau{background:rgba(139,92,246,.1);color:#7c3aed}
@keyframes pd{0%,100%{box-shadow:0 0 0 3px rgba(239,68,68,.25)}50%{box-shadow:0 0 0 7px rgba(239,68,68,.08)}}
</style>
</head>

const GS_URL = 'https://script.google.com/macros/s/AKfycbxpu-cBEHy_1VZevh0Fx1_L1IXIKxeG1KhQvVh5TvpJh6pNAwElnhYITrE2p3Vrv4cr/exec';

// Salva localmente (sempre, para fallback offline)
function _saveLocal(){
  try{
    localStorage.setItem('pcm4_us', JSON.stringify(USERS));
    localStorage.setItem('pcm4_os', JSON.stringify(OS_DATA));
    localStorage.setItem('pcm4_eq', JSON.stringify(EQUIPAMENTOS));
    localStorage.setItem('pcm4_est',JSON.stringify(ESTOQUE));
    localStorage.setItem('pcm4_pm', JSON.stringify(PLANO_PREV));
    localStorage.setItem('pcm4_cu', JSON.stringify(CUSTOS_DATA));
    localStorage.setItem('pcm4_ts', Date.now().toString());
  }catch(e){}
}

// Lê do localStorage
function _loadLocal(){
  try{
    const pairs=[['pcm4_us',USERS],['pcm4_os',OS_DATA],['pcm4_eq',EQUIPAMENTOS],['pcm4_est',ESTOQUE],['pcm4_pm',PLANO_PREV],['pcm4_cu',CUSTOS_DATA]];
    pairs.forEach(([k,arr])=>{
      const raw=localStorage.getItem(k);
      if(raw){const p=JSON.parse(raw);if(Array.isArray(p)&&p.length>0)arr.splice(0,arr.length,...p);}
    });
  }catch(e){}
}

// Mostra indicador de sync
function _ind(txt,color,hide){
  const si=document.getElementById('si');if(!si)return;
  si.style.display='flex';si.textContent=txt;
  si.style.cssText+=`;background:${color}22;border-color:${color}55;color:${color};`;
  if(hide){clearTimeout(window._st);window._st=setTimeout(()=>{si.style.display='none';},2000);}
}

// Envia UMA aba para o Google Sheets
function _sendSheet(name, data){
  return fetch(GS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({sheet:name, rows:data})
  });
}

// saveAll — salva local E envia para Google Sheets
function saveAll(){
  _saveLocal();
  _ind('↻ Sincronizando...','#f97316',false);
  Promise.all([
    _sendSheet('USERS',       USERS),
    _sendSheet('OS_DATA',     OS_DATA),
    _sendSheet('EQUIPAMENTOS',EQUIPAMENTOS),
    _sendSheet('ESTOQUE',     ESTOQUE),
    _sendSheet('PLANO_PREV',  PLANO_PREV),
    _sendSheet('CUSTOS_DATA', CUSTOS_DATA),
    _sendSheet('KPI_DATA',    typeof KPI_DATA!=='undefined'?KPI_DATA:[]),
    _sendSheet('MENSAL_DATA', typeof MENSAL_DATA!=='undefined'?MENSAL_DATA:[]),
  ]).then(()=>{ _ind('✓ Salvo','#22c55e',true); })
    .catch(()=>{ _ind('✓ Salvo (local)','#f59e0b',true); });
}

// Carrega dados do Google Sheets; fallback para localStorage
function loadSaved(){
  return fetch(GS_URL+'?t='+Date.now())
    .then(r=>r.json())
    .then(d=>{
      function pr(row){
        const r={...row};
        Object.keys(r).forEach(k=>{
          const v=r[k];
          if(typeof v==='string'){
            if(v==='true'){r[k]=true;return;}
            if(v==='false'){r[k]=false;return;}
            if(v!==''&&!isNaN(v)){r[k]=Number(v);return;}
            if((v.startsWith('[')||v.startsWith('{'))){try{r[k]=JSON.parse(v);}catch(e){}}
          }
        });
        return r;
      }
      const map=[['USERS',USERS],['OS_DATA',OS_DATA],['EQUIPAMENTOS',EQUIPAMENTOS],['ESTOQUE',ESTOQUE],['PLANO_PREV',PLANO_PREV],['CUSTOS_DATA',CUSTOS_DATA],['KPI_DATA',KPI_DATA],['MENSAL_DATA',MENSAL_DATA]];
      map.forEach(([k,arr])=>{
        if(d[k]&&Array.isArray(d[k])&&d[k].length>0){
          arr.splice(0,arr.length,...d[k].map(pr));
        }
      });
      _saveLocal(); // atualiza cache local
    })
    .catch(()=>{
      _loadLocal(); // usa cache local se Sheets falhar
    });
}

// Carrega imediatamente (síncrono do local para não travar)

// ══ AUTH ══
function ql(u,p){R('dom').value='PCM';R('usr').value=u;R('pwd').value=p;}
function doLogin(){
  const d=R('dom').value.trim().toUpperCase(),u=R('usr').value.trim(),p=R('pwd').value.trim(),err=R('lerr');
  if(d!=='PCM'){err.textContent='Domínio inválido.';err.classList.remove('hide');return;}
  err.classList.add('hide');
  const btn=R('lbtn');btn.textContent='Carregando...';btn.disabled=true;
  loadSaved().then(()=>{
    btn.textContent='Entrar no Sistema';btn.disabled=false;
    const user=USERS.find(x=>x.username===u&&x.password===p);
    if(!user){err.textContent='Usuário ou senha inválidos.';err.classList.remove('hide');return;}
    err.classList.add('hide');currentUser=user;
    R('ls').classList.add('hide');R('app').classList.remove('hide');
    buildSB();updUser();nav('dashboard');
    // Auto-sync a cada 30s
    window._syncInt=setInterval(()=>{
      loadSaved().then(()=>{ if(currentPage) nav(currentPage); });
    },30000);
  }).catch(()=>{
    btn.textContent='Entrar no Sistema';btn.disabled=false;
    const user=USERS.find(x=>x.username===u&&x.password===p);
    if(!user){err.textContent='Usuário ou senha inválidos.';err.classList.remove('hide');return;}
    err.classList.add('hide');currentUser=user;
    R('ls').classList.add('hide');R('app').classList.remove('hide');
    buildSB();updUser();nav('dashboard');
  });
}
function doLogout(){currentUser=null;clearInterval(window._syncInt);R('app').classList.add('hide');R('ls').classList.remove('hide');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!R('ls').classList.contains('hide'))doLogin();});

// ══ NAV ══
function buildSB(){
  const al=ACCESS[currentUser.role]||[];
  const sbnav=R('sbnav');sbnav.innerHTML='';
  NAV.filter(n=>al.includes(n.k)).forEach(n=>{
    const el=document.createElement('div');el.className='ni'+(n.k===currentPage?' active':'');
    el.dataset.k=n.k;el.innerHTML=`<span>${n.i}</span><span>${n.l}</span>`;
    el.onclick=()=>nav(n.k);sbnav.appendChild(el);
  });
}
function updUser(){
  R('uav').textContent=currentUser.name[0].toUpperCase();
  R('unm').textContent=currentUser.name;
  R('url').textContent=rname(currentUser.role)+' · '+currentUser.area;
}
function nav(page){
  Object.values(charts).forEach(ch=>{try{ch.destroy();}catch(e){}});charts={};
  currentPage=page;
  R('sbnav').querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.k===page));
  const item=NAV.find(n=>n.k===page);
  R('tbt').textContent=(item?.i||'')+' '+(item?.l||'');
  // Remove top scroll bar before clearing content
  const oldBar = document.getElementById('pc-top-scroll');
  if(oldBar) oldBar.remove();
  const pc = R('pc');
  if(pc){ pc.dataset.topScroll=''; pc.style.overflowX=''; pc.innerHTML=''; }
  ({dashboard:rDash,os:rOS,equipamentos:rEQ,preventivo:rPM,estoque:rEST,custos:rCU,indicadores:rIND,usuarios:rUS}[page]||rDash)(R('pc'));
  setTimeout(applyDS,80);
}
function goOS(filter){
  osF.status=filter==='_atraso'?'Todos':filter;osF.tipo='Todos';osF.busca='';osF._atraso=filter==='_atraso';nav('os');
}

// ══ DUAL SCROLL ══
function applyDS(){
  document.querySelectorAll('.tw').forEach(w=>{
    if(w.dataset.ds)return;w.dataset.ds='1';
    const m=document.createElement('div');m.className='tm';
    const mi=document.createElement('div');mi.style.cssText='height:1px;display:block;';
    m.appendChild(mi);w.parentNode.insertBefore(m,w);
    function sw(){mi.style.width=w.scrollWidth+'px';}sw();
    let lm=false,lw=false;
    m.addEventListener('scroll',()=>{if(lw)return;lm=true;w.scrollLeft=m.scrollLeft;lm=false;});
    w.addEventListener('scroll',()=>{if(lm)return;lw=true;m.scrollLeft=w.scrollLeft;lw=false;});
    new ResizeObserver(sw).observe(w);
  });

  // Scrollbar espelho no topo do conteúdo da página (dashboard, etc)
  const pc = document.getElementById('pc');
  if(pc && !pc.dataset.topScroll){
    pc.dataset.topScroll='1';
    // Cria barra espelho fixada no topo da área de conteúdo
    const topBar = document.createElement('div');
    topBar.id = 'pc-top-scroll';
    topBar.style.cssText = [
      'overflow-x:auto','overflow-y:hidden','height:10px',
      'background:var(--surf2)','border-bottom:1px solid var(--bdr)',
      'position:sticky','top:0','z-index:10','width:100%',
      'flex-shrink:0'
    ].join(';');
    const inner = document.createElement('div');
    inner.style.cssText = 'height:1px;display:block;';
    topBar.appendChild(inner);

    // Estilo da scrollbar
    if(!document.getElementById('top-scroll-style')){
      const st = document.createElement('style');
      st.id = 'top-scroll-style';
      st.textContent = `
        #pc-top-scroll::-webkit-scrollbar{height:10px}
        #pc-top-scroll::-webkit-scrollbar-track{background:var(--surf2)}
        #pc-top-scroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
        #pc-top-scroll::-webkit-scrollbar-thumb:hover{background:var(--acc)}
      `;
      document.head.appendChild(st);
    }

    // Insere ANTES do pc
    pc.parentNode.insertBefore(topBar, pc);

    // Sincroniza scroll
    function syncW(){ inner.style.width = pc.scrollWidth + 'px'; }
    syncW();
    let lt=false,lp=false;
    topBar.addEventListener('scroll',()=>{if(lp)return;lt=true;pc.scrollLeft=topBar.scrollLeft;lt=false;});
    pc.addEventListener('scroll',()=>{if(lt)return;lp=true;topBar.scrollLeft=pc.scrollLeft;lp=false;});

    // Adiciona overflow-x ao pc para rolar horizontalmente
    pc.style.overflowX = 'auto';

    new ResizeObserver(syncW).observe(pc);
  }
}

function rDash(c){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const pd=s=>{if(!s)return null;const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);};
  const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Anos disponíveis nas OS
  const anosDisp=[...new Set(OS_DATA.map(o=>{
    const dt=o.dataAbertura&&o.dataAbertura.split('/');
    return dt&&dt.length===3&&dt[2]?+dt[2]:null;
  }).filter(Boolean))].sort((a,b)=>b-a);

  // Inicializa ano padrão apenas uma vez — usa o ano com mais OS
  if(_dashAno === null){
    _dashAno = anosDisp.length>0 ? anosDisp[0] : new Date().getFullYear();
  }
  const ano = _dashAno;
  const mes = (_dashMes!==null && _dashMes>=1 && _dashMes<=12) ? _dashMes : null;

  // Atualiza texto da topbar com o ano atual
  const tbm = document.getElementById('tbm');
  if(tbm) tbm.textContent = 'Unidade CD Nova Santa Rita · PCM ' + ano;

  // Filtra OS do período — SEM fallback, dados exatos do período
  const os = OS_DATA.filter(o=>{
    const dt = o.dataAbertura && o.dataAbertura.split('/');
    if(!dt || dt.length < 3) return false;
    const oAno = +dt[2], oMes = +dt[1];
    if(mes !== null) return oAno===ano && oMes===mes;
    return oAno===ano;
  });
  const semDadosPeriodo = os.length === 0;

  const conc =os.filter(o=>o.status==='Concluída').length;
  const and  =os.filter(o=>o.status==='Em Andamento').length;
  const emg  =os.filter(o=>o.status==='Emergência').length;
  const agu  =os.filter(o=>o.status==='Aguardando').length;
  const plan =os.filter(o=>o.status==='Planejada').length;
  const atr  =os.filter(o=>o.status!=='Concluída'&&pd(o.dataPrevista)&&pd(o.dataPrevista)<hoje).length;
  const total=os.length;


  // ── Indicadores de performance REAIS ──
  // MTTR: média HH real das corretivas concluídas
  const corrConc=os.filter(o=>o.tipo==='Corretiva'&&o.status==='Concluída'&&+o.hhReal>0);
  const mttrVal=corrConc.length>0?+(corrConc.reduce((a,o)=>a+(+o.hhReal||0),0)/corrConc.length).toFixed(1):null;
  // MTBF: HH operação / nº falhas
  const hhP=os.reduce((a,o)=>a+(+o.hhPrevisto||0),0);
  const hhR=os.reduce((a,o)=>a+(+o.hhReal||0),0);
  const hhReparo=corrConc.reduce((a,o)=>a+(+o.hhReal||0),0);
  const mtbfVal=os.filter(o=>o.tipo==='Corretiva').length>0?+((Math.max(hhP-hhReparo,0))/os.filter(o=>o.tipo==='Corretiva').length).toFixed(0):null;
  // Disponibilidade: OS sem atraso e sem emergência / total
  const dispVal=total>0?+(((total-atr-emg)/total)*100).toFixed(1):100;
  // Eficiência: concluídas / total
  const efVal=total>0?+(conc/total*100).toFixed(1):0;
  // % OS Preventivas no período (mais claro e baseado nas OS reais)
  const osPrev = os.filter(o=>o.tipo==='Preventiva').length;
  const osPreVConc = os.filter(o=>o.tipo==='Preventiva'&&o.status==='Concluída').length;
  // Aderência = preventivas concluídas / preventivas abertas no período
  // Se não há preventivas no período, mostra N/A
  const adVal = osPrev > 0 ? +(osPreVConc/osPrev*100).toFixed(1) : null;

  const gauges=[
    {l:'MTBF',     v:mtbfVal!==null?mtbfVal+'h':'—',  pct:mtbfVal!==null?Math.min(mtbfVal/300*100,100):0, meta:'≥300h', ok:mtbfVal!==null&&mtbfVal>=300, c:mtbfVal!==null&&mtbfVal>=300?'#22c55e':'#ef4444'},
    {l:'MTTR',     v:mttrVal!==null?mttrVal+'h':'—',  pct:mttrVal!==null?Math.min((4/Math.max(mttrVal,.1))*100,100):0, meta:'≤4h',   ok:mttrVal!==null&&mttrVal<=4,  c:mttrVal!==null&&mttrVal<=4?'#22c55e':'#ef4444'},
    {l:'Disponib.',v:dispVal+'%',  pct:dispVal,        meta:'≥95%',  ok:dispVal>=95, c:dispVal>=95?'#22c55e':'#ef4444'},
    {l:'Eficiência',v:efVal+'%',   pct:efVal,          meta:'≥80%',  ok:efVal>=80,   c:efVal>=80?'#22c55e':'#f59e0b'},
    {l:'Prev. Concluídas', v:adVal!==null?adVal+'%':'Sem prev.', pct:adVal||0, meta:'≥80%', ok:adVal!==null&&adVal>=80, c:adVal!==null?(adVal>=80?'#22c55e':'#f59e0b'):'#6b7a9b'},
  ];

  // ── KPI cards ──
  const kpis=[
    {v:total,l:'Total OS',    sub:'todas as ordens',    c:'#f97316',i:'📋',f:'Todos'},
    {v:conc, l:'Concluídas',  sub:'finalizadas',         c:'#22c55e',i:'✅',f:'Concluída'},
    {v:and,  l:'Em Andamento',sub:'em execução',         c:'#3b82f6',i:'🔄',f:'Em Andamento'},
    {v:emg,  l:'Emergências', sub:'atenção imediata',    c:'#c026d3',i:'🚨',f:'Emergência'},
    {v:agu,  l:'Aguardando',  sub:'na fila',             c:'#f59e0b',i:'⏳',f:'Aguardando'},
    {v:plan, l:'Planejadas',  sub:'programadas',         c:'#8b5cf6',i:'📅',f:'Planejada'},
    {v:atr,  l:'Em Atraso',   sub:'passou da data prev.',c:'#ef4444',i:'⏰',f:'_atraso',pulse:true},
  ];
  const kh=kpis.map(k=>`<div class="kc" onclick="goOS('${k.f}')" style="border-color:${k.pulse&&k.v>0?k.c:'var(--bdr)'}"
    onmouseover="this.style.borderColor='${k.c}';this.style.transform='translateY(-3px)';this.style.boxShadow='0 12px 32px rgba(0,0,0,.3)'"
    onmouseout="this.style.borderColor='${k.pulse&&k.v>0?k.c:'var(--bdr)'}';this.style.transform='none';this.style.boxShadow='none'">
    <div class="ka" style="background:${k.c}"></div>
    ${k.pulse&&k.v>0?`<div style="position:absolute;top:14px;right:14px;width:9px;height:9px;border-radius:50%;background:${k.c};animation:pd 1.8s ease-in-out infinite"></div>`:''}
    <div style="position:absolute;right:-4px;bottom:-6px;font-size:52px;opacity:.07;pointer-events:none">${k.i}</div>
    <div style="position:absolute;top:12px;left:14px;font-size:9px;color:${k.c}88;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Ver detalhes →</div>
    <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:14px">${k.l}</div>
    <div style="font-size:44px;font-weight:800;line-height:1;color:${k.c};letter-spacing:-2px">${k.v}</div>
    <div style="font-size:11px;color:var(--mut);margin-top:8px">${k.sub}</div>
    <div style="margin-top:12px;background:${k.c}22;border-radius:3px;height:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:${k.c};width:${total>0?Math.round((k.v/total)*100):0}%"></div></div>
  </div>`).join('');

  // ── Gráficos: tipo e área ──
  const tdMap={Corretiva:0,Preventiva:0,Preditiva:0,Melhoria:0};
  const taMap={Corretiva:0,Preventiva:0,Preditiva:0,Melhoria:0};
  os.forEach(o=>{tdMap[o.tipo]=(tdMap[o.tipo]||0)+1;if(o.status!=='Concluída'&&pd(o.dataPrevista)&&pd(o.dataPrevista)<hoje)taMap[o.tipo]=(taMap[o.tipo]||0)+1;});
  const tl=['Corretiva','Preventiva','Preditiva','Melhoria'];
  const tnp=tl.map(t=>(tdMap[t]||0)-(taMap[t]||0)),tat=tl.map(t=>taMap[t]||0),ttot=tl.map((_,i)=>tnp[i]+tat[i]);
  const tnpp=tnp.map((v,i)=>ttot[i]>0?+((v/ttot[i])*100).toFixed(1):0);
  const tatp=tat.map((v,i)=>ttot[i]>0?+((v/ttot[i])*100).toFixed(1):0);
  const areas=[...new Set(os.map(o=>o.area))].map(a=>({a,n:os.filter(o=>o.area===a).length})).sort((a,b)=>b.n-a.n);
  const anr=areas.map(x=>{const at=os.filter(o=>o.area===x.a&&o.status!=='Concluída'&&pd(o.dataPrevista)&&pd(o.dataPrevista)<hoje).length;return x.n-at;});
  const aar=areas.map(x=>os.filter(o=>o.area===x.a&&o.status!=='Concluída'&&pd(o.dataPrevista)&&pd(o.dataPrevista)<hoje).length);
  const atot=areas.map(x=>x.n);
  const anrp=anr.map((v,i)=>atot[i]>0?+((v/atot[i])*100).toFixed(1):0);
  const aarp=aar.map((v,i)=>atot[i]>0?+((v/atot[i])*100).toFixed(1):0);

  // ── Evolução mensal REAL ──
  const mesesComDados=MESES.map((nm,i)=>{
    const mi=i+1;
    const osM=OS_DATA.filter(o=>{const dt=o.dataAbertura&&o.dataAbertura.split('/');return dt&&+dt[2]===ano&&+dt[1]===mi;});
    return {nm,mi,total:osM.length,conc:osM.filter(o=>o.status==='Concluída').length,
      atr:osM.filter(o=>o.status!=='Concluída'&&pd(o.dataPrevista)&&pd(o.dataPrevista)<hoje).length};
  }).filter(m=>m.total>0);
  const evolLabels=mesesComDados.map(m=>m.nm.slice(0,3));
  const evolAbertas=mesesComDados.map(m=>m.total);
  const evolConc=mesesComDados.map(m=>m.conc);
  const evolAtr=mesesComDados.map(m=>m.atr);

  // Seletor de ano — mostra todos os anos com OS + ano selecionado + setas livres
  const todosAnos = [...new Set([...anosDisp, ano])].sort((a,b)=>b-a);
  const anoSel = `
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
      <button onclick="selDashAno(${ano-1})" title="Ano anterior"
        style="width:28px;height:28px;border-radius:6px;font-size:15px;font-weight:800;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf2);color:var(--mut);display:flex;align-items:center;justify-content:center">‹</button>
      ${todosAnos.map(y=>`
        <button onclick="selDashAno(${y})"
          style="padding:5px 14px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;
            border:2px solid ${y===ano?'var(--navy)':'var(--bdr)'};
            background:${y===ano?'var(--navy)':'#fff'};
            color:${y===ano?'#fff':'var(--mut)'};
            transition:all .15s">
          ${y}${anosDisp.includes(y)?'':' ·'}
        </button>`).join('')}
      <button onclick="selDashAno(${ano+1})" title="Próximo ano"
        style="width:28px;height:28px;border-radius:6px;font-size:15px;font-weight:800;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf2);color:var(--mut);display:flex;align-items:center;justify-content:center">›</button>
    </div>`;

  // ── Seletor de Mês: botão compacto + dropdown ──
  const mesBtnLabel = mes !== null ? MESES[mes-1] : 'Ano Todo';
  const mesBtnColor = mes !== null ? 'var(--acc)' : 'var(--surf2)';
  const mesBtnTxt   = mes !== null ? '#fff' : 'var(--mut2)';
  const mesBtnBdr   = mes !== null ? 'var(--acc)' : 'var(--bdr)';

  const mesOpcoes = [
    `<div onclick="selDashMes(0)" style="padding:10px 16px;cursor:pointer;font-size:13px;font-weight:700;color:${mes===null?'var(--acc)':'var(--txt)'};background:${mes===null?'var(--accent-dim)':'transparent'};transition:background .1s" onmouseover="this.style.background='var(--surf2)'" onmouseout="this.style.background='${mes===null?'var(--accent-dim)':'transparent'}'">
      📅 Ano Todo
    </div>`,

  const td=conc+and+agu+emg+plan+atr;

  charts['a']=new Chart(R('cha'),{type:'bar',data:{labels:areas.map(x=>x.a),datasets:[{label:'No Prazo',data:anrp,rawData:anr,backgroundColor:'#f97316',borderRadius:4,borderSkipped:false,stack:'s'},{label:'Em Atraso',data:aarp,rawData:aar,backgroundColor:'#ef4444',borderRadius:4,borderSkipped:false,stack:'s'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttcfg,callbacks:{label:ctx=>`  ${ctx.dataset.label}: ${ctx.dataset.rawData?ctx.dataset.rawData[ctx.dataIndex]:ctx.raw} OS (${ctx.raw}%)`}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7a9b',font:{size:11},callback:v=>v+'%'},beginAtZero:true,max:100,stacked:true},y:{grid:{display:false},ticks:{color:'#6b7a9b',font:{size:11}},stacked:true}}}});

// ══ OS ══
let osF={busca:'',status:'Todos',tipo:'Todos',_atraso:false};
function rOS(c){
  c.innerHTML=`<div class="card"><div class="ch"><div class="ct">🔧 Ordens de Serviço</div><div class="ctl">
    <input class="inp insm" style="width:200px" placeholder="🔍 Buscar..." value="${esc(osF.busca)}" oninput="osF.busca=this.value;osF._atraso=false;rOST()">
    <select class="inp insm" onchange="osF.status=this.value;osF._atraso=false;rOST()">${['Todos','Concluída','Em Andamento','Aguardando','Emergência','Planejada'].map(s=>`<option${osF.status===s?' selected':''}>${s}</option>`).join('')}</select>
    <select class="inp insm" onchange="osF.tipo=this.value;rOST()">${['Todos','Corretiva','Preventiva','Preditiva','Melhoria'].map(t=>`<option${osF.tipo===t?' selected':''}>${t}</option>`).join('')}</select>
    ${osF._atraso?`<span style="background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:6px">⏰ Em Atraso <span onclick="osF._atraso=false;osF.status='Todos';rOS(R('pc'))" style="cursor:pointer;opacity:.7">✕</span></span>`:''}
    ${isAdmin()?`<button class="btn bp bsm" onclick="openNovOS()">➕ Nova OS</button>`:''}
  </div></div><div id="ostw"></div></div>`;
  rOST();
}
function rOST(){
  const b=osF.busca.toLowerCase(),hoje=new Date();hoje.setHours(0,0,0,0);
  const pd=s=>{if(!s)return null;const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);};
  const f=OS_DATA.filter(o=>{
    const s=(o.id+o.equipamento+o.area+o.executante+o.tag).toLowerCase().includes(b);
    const st=osF.status==='Todos'||o.status===osF.status;
    const tp=osF.tipo==='Todos'||o.tipo===osF.tipo;
    if(osF._atraso){const dp=pd(o.dataPrevista);return s&&tp&&o.status!=='Concluída'&&dp&&dp<hoje;}
    return s&&st&&tp;
  });
  const w=R('ostw');
  if(!f.length){w.innerHTML='<div class="emp"><div style="font-size:40px;margin-bottom:10px">🔍</div>Nenhuma OS encontrada</div>';return;}
  const rows=f.map(o=>`<tr onclick="openOS('${esc(o.id)}')" style="cursor:pointer"
    onmouseover="this.style.background='rgba(249,115,22,.06)'" onmouseout="this.style.background=''">
    <td><strong style="color:var(--acc);font-size:13px;font-weight:800">${esc(o.id)}</strong></td>
    <td>${bdg(o.tipo,'#6b7a9b')}</td><td>${bdg(o.prioridade,pcol(o.prioridade))}</td>
    <td>${esc(o.equipamento)}</td><td style="color:var(--mut);font-size:12px">${esc(o.tag)}</td>
    <td>${esc(o.area)}</td><td>${esc(o.executante)}</td>
    <td style="color:var(--mut);font-size:12px">${esc(o.dataAbertura)}${o.horaAbertura?' '+esc(o.horaAbertura):''}</td>
    <td>${o.hhPrevisto}h</td><td>${bdg(o.status,scol(o.status))}</td>
    <td style="text-align:center">${o.okTecnico?'<span style="color:#22c55e">✅</span>':'<span style="color:var(--mut)">—</span>'}</td>
    <td onclick="event.stopPropagation()"><button class="btn bs bsm" onclick="openOS('${esc(o.id)}')">${isAdmin()?'✏️ Editar':'👁 Ver'}</button></td>
  </tr>`).join('');
  w.innerHTML=`<div class="tw"><table><thead><tr><th>Nº OS</th><th>Tipo</th><th>Prioridade</th><th>Equipamento</th><th>TAG</th><th>Área</th><th>Executante</th><th>Data Abertura</th><th>HH Prev.</th><th>Status</th><th>OK</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  setTimeout(applyDS,30);
}
function openOS(id){
  const os=OS_DATA.find(o=>o.id===id);if(!os)return;
  rOSModal(os);
}
function rOSModal(os){
  window._osEditId = os.id;
  const admin = isAdmin();
  const cmts = os.comentarios.map(c=>`<div class="cmt"><div class="cma">${esc(c.autor)} · ${esc(c.role)} · ${esc(c.data)}</div><div class="cmx">${esc(c.texto)}</div></div>`).join('')||'<p style="color:var(--mut);font-size:13px">Sem comentários.</p>';

  // Campos editáveis (admin) ou somente leitura

  const stOpts=['Planejada','Aguardando','Em Andamento','Concluída','Emergência'];

        <div style="font-size:12px;color:var(--mut)">${os.dataConclusao?'Concluída em '+os.dataConclusao+(os.horaConclusao?' às '+os.horaConclusao:''):''}</div>
        ${fotoBlk}
       </div>`
    : `<div style="border:1.5px solid var(--bdr);border-radius:12px;padding:16px;margin-top:16px">
        <div style="font-size:13px;font-weight:800;margin-bottom:14px">🔧 Atualizar Status da OS</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn" onclick="mudarStatusOS('Em Andamento')"
            style="flex:1;padding:12px;border-radius:10px;border:2px solid #3b82f6;background:rgba(59,130,246,.1);color:#3b82f6;font-size:13px;font-weight:700;cursor:pointer">

          </button>

            ✅ Concluir OS<br><span style="font-size:11px;font-weight:400;opacity:.8">Dar OK e finalizar</span>

        <!-- Painel de conclusão (oculto até clicar Concluir) -->

          <div class="fg2" style="margin-bottom:12px">

              <label>Data de Conclusão</label>

            </div>
            <div class="fg">
              <label>Hora de Conclusão</label>

          </div>
        </div>
       </div>`;

  const formCols = admin ? `<div class="fg2">
    ${select('Tipo OS',tpOpts,os.tipo,'e-tp')}
    ${select('Prioridade',prOpts,os.prioridade,'e-pr')}

}

function prevFoto(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=R('foto-prev');
    if(img){img.src=e.target.result;img.style.display='block';}
    window._fotoBase64=e.target.result;
  };
  reader.readAsDataURL(file);
}

function mudarStatusOS(novoStatus){
  const os=OS_DATA.find(o=>o.id===window._osEditId);if(!os)return;
  os.status=novoStatus;
  if(novoStatus==='Em Andamento' && !os.dataInicio){
    const ag=new Date();
    os.dataInicio=ag.toLocaleDateString('pt-BR');
    os.horaInicio=ag.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  saveAll();cm();rOST();
}

function confirmarConclusao(){
  const os=OS_DATA.find(o=>o.id===window._osEditId);if(!os)return;
  const ag=new Date();
  os.status='Concluída';
  os.okTecnico=true;
  os.dataConclusao=R('conc-data')?R('conc-data').value:ag.toLocaleDateString('pt-BR');
  os.horaConclusao=R('conc-hora')?R('conc-hora').value:ag.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  os.hhReal=parseFloat(R('conc-hhr')?R('conc-hhr').value:os.hhReal)||os.hhReal;
  if(window._fotoBase64){ os.foto=window._fotoBase64; window._fotoBase64=null; }
  saveAll();cm();rOST();
}

// ══ INDICADORES ══
// Estado de navegação
// Detecta o ano com mais OS para usar como padrão
let _indAno = (function(){
  const anos = {};
  OS_DATA.forEach(o=>{ const dt=o.dataAbertura&&o.dataAbertura.split('/')[2]; if(dt) anos[+dt]=(anos[+dt]||0)+1; });
  const entries = Object.entries(anos);
  if(entries.length===0) return new Date().getFullYear();
  return +entries.sort((a,b)=>b[1]-a[1])[0][0];
})();
let _indMes = null; // null = visão anual

const MESES_NOME = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// Extrai ano e mês de uma data no formato dd/mm/yyyy
function _parseDt(s){
  if(!s) return null;
  const [d,m,y] = s.split('/');
  if(!y||!m) return null;
  return {ano:+y, mes:+m, dia:+d};
}

// Seleciona/deseleciona mês (0 = ano todo)
function selMes(mi){
  if(mi===0){ _indMes=null; }
  else { _indMes = (_indMes===mi) ? null : mi; }
  rIND(R('pc'));
}

// Calcula indicadores automaticamente a partir das OS para um ano/mês específico
function _calcInd(ano, mes){
  // Filtra OS EXATAMENTE pelo período — sem nenhum fallback
  const osFinal = OS_DATA.filter(o=>{
    const dt = _parseDt(o.dataAbertura);
    if(!dt) return false;
    if(mes !== null) return dt.ano===ano && dt.mes===mes;
    return dt.ano===ano;
  });

  // Verifica se há dados no ano (para aviso)
  const temNoAno = OS_DATA.some(o=>{ const dt=_parseDt(o.dataAbertura); return dt&&dt.ano===ano; });
  const semDados = !temNoAno;
  const usandoTodos = mes!==null && osFinal.length===0;

  return _calcIndDireto(osFinal, mes, semDados, usandoTodos);
}

function rIND(c){
  const ano = _indAno;
  const mes = _indMes;
  const ind = _calcInd(ano, mes);

  // KPI cards

  // Seletor de ano com setas
  const anoSel = `

        style="width:36px;height:36px;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;border:2px solid var(--bdr);background:var(--surf2);color:var(--mut2);display:flex;align-items:center;justify-content:center">‹</button>
      <div style="padding:8px 22px;border-radius:8px;font-size:18px;font-weight:800;border:2px solid var(--acc);background:var(--acc);color:#fff;min-width:90px;text-align:center">${ano}</div>

  // Tabela mensal com dados reais por mês
  const mRows = MESES_NOME.map((nm,i)=>{
    const mi = i+1;
    // Calcula APENAS para as OS reais do mês (sem fallback)
    const osM = OS_DATA.filter(o=>{ const dt=_parseDt(o.dataAbertura); return dt&&dt.ano===ano&&dt.mes===mi; });
    const d = osM.length>0 ? _calcIndDireto(osM, mi) : null;
    const sel = mes===mi;
    if(!d) return `<tr onclick="selMes(${mi})" style="cursor:pointer;opacity:.45">

      <td colspan="13" style="color:var(--mut);font-size:12px">Sem OS registradas</td>
    </tr>`;
    return `<tr onclick="selMes(${mi})" style="cursor:pointer;${sel?'background:rgba(249,115,22,.08);outline:2px solid var(--acc);outline-offset:-1px':''}">
      <td><strong style="color:${sel?'var(--acc)':'var(--txt)'}">${nm}</strong></td>
      <td style="font-weight:700">${d.total}</td>
      <td style="color:#22c55e;font-weight:700">${d.conc}</td>
      <td style="color:#ef4444;font-weight:700">${d.corr}</td>
      <td style="color:#22c55e;font-weight:700">${d.prev}</td>
      <td style="color:#3b82f6;font-weight:700">${d.pred}</td>
      <td>${d.hhP}h</td><td>${d.hhR}h</td>
      <td>${bdg(d.pCorr+'%',d.pCorr<=20?'#22c55e':'#ef4444')}</td>
      <td>${bdg(d.pPrev+'%',d.pPrev>=80?'#22c55e':'#f59e0b')}</td>
      <td>${d.mtbfOk?d.mtbf+'h':'—'}</td>
      <td>${d.mttrOk?d.mttr+'h':'—'}</td>
      <td style="color:var(--acc);font-weight:700">${fR(d.cu)}</td>
      <td>${bdg(d.di+'%',d.di>=95?'#22c55e':'#ef4444')}</td>
    </tr>`;
  }).join('');

  // Total do ano
  const osAno = OS_DATA.filter(o=>{ const dt=_parseDt(o.dataAbertura); return dt&&dt.ano===ano; });
  const dAno = osAno.length>0 ? _calcIndDireto(osAno, null) : null;

  // Aviso se período sem dados
  const aviso = ind.semDados
    ? `<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#f59e0b;font-weight:600">⚠️ Sem OS no ano ${ano} — exibindo dados de todas as OS cadastradas</div>`
    : (ind.usandoTodos&&mes!==null ? `<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#3b82f6;font-weight:600">ℹ️ Sem OS em ${MESES_NOME[mes-1]} — exibindo dados do ano ${ano}</div>` : '');

  c.innerHTML=`
    <div class="card" style="margin-bottom:18px;padding:18px 20px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">Ano</div>
        ${anoSel}
        <button onclick="selMes(0)" style="padding:8px 16px;border-radius:8px;font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:2px solid ${mes===null?'#22c55e':'var(--bdr)'};background:${mes===null?'rgba(34,197,94,.12)':'var(--surf2)'};color:${mes===null?'#22c55e':'var(--mut2)'}">
          ${mes===null?'✅ ':''} Ano Todo
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">Mês</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${mesSel}</div>
      </div>
    </div>

    ${aviso}

    <div style="font-size:20px;font-weight:800;margin-bottom:14px">
      📊 KPIs — ${mes!==null?MESES_NOME[mes-1]+' ':''} ${ano}
      <span style="font-size:13px;font-weight:400;color:var(--mut);margin-left:10px">${ind.total} OS no período</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px">${kCards}</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px">
      <div class="card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px">OS Abertas</div>
        <div style="font-size:32px;font-weight:800;color:#f97316">${ind.total}</div>
      </div>
      <div class="card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px">OS Concluídas</div>
        <div style="font-size:32px;font-weight:800;color:#22c55e">${ind.conc}</div>
      </div>
      <div class="card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px">HH Previsto / Real</div>
        <div style="font-size:26px;font-weight:800;color:#3b82f6">${ind.hhP}h <span style="font-size:16px;color:var(--mut)">/ ${ind.hhR}h</span></div>
      </div>
      <div class="card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px">Custo Total</div>
        <div style="font-size:20px;font-weight:800;color:#22c55e">${fR(ind.cu)}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:4px">${ind.cuFonte==='registrado'?'Da aba Custos':'Estimado: HH real × R$120/h'}</div>
      </div>
    </div>

    <div class="card">
      <div class="ch">
        <div class="ct">📈 Evolução Mensal — ${ano}</div>
        <div style="font-size:11px;color:var(--mut)">Clique em um mês para ver os KPIs daquele mês</div>
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th>Mês</th><th>OS Total</th><th>Concluídas</th><th>Corretivas</th><th>Preventivas</th><th>Preditivas</th>
          <th>HH Prev.</th><th>HH Real</th><th>% Corretiva</th><th>% Preventiva</th><th>MTBF</th><th>MTTR</th>
          <th>Custo</th><th>Disponib.%</th>
        </tr></thead>
        <tbody>${mRows}</tbody>
        ${dAno?`<tfoot><tr style="font-weight:800">
          <td>TOTAL ${ano}</td>
          <td>${dAno.total}</td><td style="color:#22c55e">${dAno.conc}</td>
          <td style="color:#ef4444">${dAno.corr}</td><td style="color:#22c55e">${dAno.prev}</td><td style="color:#3b82f6">${dAno.pred}</td>
          <td>${dAno.hhP}h</td><td>${dAno.hhR}h</td>
          <td>${dAno.pCorr}%</td><td>${dAno.pPrev}%</td>
          <td>${dAno.mtbfOk?dAno.mtbf+'h':'—'}</td><td>${dAno.mttrOk?dAno.mttr+'h':'—'}</td>
          <td style="color:var(--acc)">${fR(dAno.cu)}</td>
          <td>${dAno.di}%</td>
        </tr></tfoot>`:''}
      </table></div>
    </div>`;
  setTimeout(applyDS,30);
  _syncIndGS(ano,mes,ind);
}

// Calcula direto de um array de OS já filtrado (sem fallback)
function _calcIndDireto(osArr, mes, semDados, usandoTodos){
  semDados = semDados||false;
  usandoTodos = usandoTodos||false;
  const total = osArr.length;
  const conc  = osArr.filter(o=>o.status==='Concluída').length;
  const corr  = osArr.filter(o=>o.tipo==='Corretiva').length;
  const prev  = osArr.filter(o=>o.tipo==='Preventiva').length;
  const pred  = osArr.filter(o=>o.tipo==='Preditiva').length;
  const emg   = osArr.filter(o=>o.status==='Emergência').length;
  const hoje  = new Date(); hoje.setHours(0,0,0,0);
  const atraso= osArr.filter(o=>{ const dp=_parseDt(o.dataPrevista); return dp&&o.status!=='Concluída'&&new Date(dp.ano,dp.mes-1,dp.dia)<hoje; }).length;
  const hhP   = osArr.reduce((a,o)=>a+(+o.hhPrevisto||0),0);
  const hhR   = osArr.reduce((a,o)=>a+(+o.hhReal||0),0);
  // ── MTTR: Tempo Médio de Reparo ──
  // = média das horas reais gastas nas OS corretivas concluídas
  const corrConc = osArr.filter(o=>o.tipo==='Corretiva'&&o.status==='Concluída'&&+o.hhReal>0);
  const mttr = corrConc.length>0
    ? +(corrConc.reduce((a,o)=>a+(+o.hhReal||0),0)/corrConc.length).toFixed(1)
    : null;

  // ── MTBF: Tempo Médio Entre Falhas ──
  // = (Total HH previsto de todas as OS − tempo de reparo) ÷ nº de falhas corretivas
  // Quanto maior o MTBF, menos falhas ocorrem → melhor
  const corrAll = osArr.filter(o=>o.tipo==='Corretiva');
  const hhReparo = corrConc.reduce((a,o)=>a+(+o.hhReal||0),0);
  const hhOperacao = Math.max(hhP - hhReparo, 0);
  const mtbf = corrAll.length>0
    ? +(hhOperacao / corrAll.length).toFixed(0)
    : null;
  const di   = total>0?+(((total-atraso-emg)/total)*100).toFixed(1):100;
  const ids  = new Set(osArr.map(o=>o.id));
  const cuReg= CUSTOS_DATA.filter(x=>ids.has(x.os)).reduce((a,x)=>a+(+x.total||0),0);
  const cu   = cuReg>0?cuReg:hhR*120;
  const cuFonte = cuReg>0?'registrado':'estimado';
  return {
    total,conc,corr,prev,pred,emg,atraso,hhP,hhR,di,cu,cuFonte,semDados,usandoTodos,
    mtbf:mtbf||0, mttr:mttr||0, mtbfOk:mtbf!==null, mttrOk:mttr!==null,
    pCorr:total>0?+((corr/total)*100).toFixed(1):0,
    pPrev:total>0?+((prev/total)*100).toFixed(1):0,
    pPred:total>0?+((pred/total)*100).toFixed(1):0,
  };
}



// Envia snapshot dos indicadores calculados para o Google Sheets
function _syncIndGS(ano, mes, ind){
  const label = mes!==null ? MESES_NOME[mes-1]+'/'+ano : 'Ano/'+ano;
  const row = {periodo:label, ano, mes:mes||0,
    total:ind.total, conc:ind.conc, corr:ind.corr, prev:ind.prev, pred:ind.pred,
    emg:ind.emg, atraso:ind.atraso, backlog:ind.backlog,
    hhP:ind.hhP, hhR:ind.hhR, ef:ind.ef, di:ind.di,
    mtbf:ind.mtbf, mttr:ind.mttr, ad:ind.ad, cu:ind.cu,
    pCorr:ind.pCorr, pPrev:ind.pPrev, pPred:ind.pPred,
    geradoEm: new Date().toLocaleString('pt-BR'),
  };
  _sendSheet('INDICADORES_CALC', [row]).catch(()=>{});
}



// ══ USUÁRIOS ══
function rUS(c){
  if(!isSA()){c.innerHTML='<div class="emp"><div style="font-size:40px;margin-bottom:10px">🔒</div>Acesso restrito ao Administrador</div>';return;}
  const rows=USERS.map((u,i)=>`<tr>
    <td>${u.id}</td><td><strong>${esc(u.name)}</strong></td>
    <td style="color:var(--mut)">${esc(u.username)}</td>
    <td>${'•'.repeat(Math.min(u.password.length,8))}</td>
    <td><span class="bdg r${u.role.slice(0,1)+u.role.slice(u.role==='administrador'?0:0)}" style="background:var(--surf2)">${rname(u.role)}</span></td>
    <td>${esc(u.area)}</td>
    <td><button class="btn bs bsm" onclick="openEditUS(${i})">✏️ Editar</button></td>
  </tr>`).join('');
  c.innerHTML=`<div class="card"><div class="ch"><div class="ct">👥 Gerenciamento de Usuários</div><button class="btn bp bsm" onclick="openNovUS()">➕ Novo Usuário</button></div>
    <div class="tw"><table><thead><tr><th>#</th><th>Nome</th><th>Usuário</th><th>Senha</th><th>Perfil</th><th>Área</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  setTimeout(applyDS,30);
}
function usForm(u){
  const ro=['administrador','lider','tecnico','auxiliar'].map(r=>`<option value="${r}"${u&&u.role===r?' selected':''}>${rname(r)}</option>`).join('');
  return `<div class="fg2"><div class="fg full"><label>Nome Completo *</label><input class="inp" id="us-nm" value="${esc(u?u.name:'')}"></div><div class="fg"><label>Login *</label><input class="inp" id="us-lg" value="${esc(u?u.username:'')}"${u&&u.username==='admin'?' readonly':''}></div><div class="fg"><label>Senha *</label><input class="inp" id="us-pw" value="${esc(u?u.password:'')}"></div><div class="fg"><label>Perfil</label><select class="inp" id="us-ro">${ro}</select></div><div class="fg"><label>Área/Setor</label><input class="inp" id="us-ar" value="${esc(u?u.area:'')}"></div></div>`;
}
function _cUS(){return {name:R('us-nm').value.trim(),username:R('us-lg').value.trim().toLowerCase(),password:R('us-pw').value.trim(),role:R('us-ro').value,area:R('us-ar').value.trim()};}
function openNovUS(){sm(`<div class="mt">➕ Novo Usuário</div>${usForm(null)}<div class="mac"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svNovUS()">✅ Criar</button></div>`);}
function svNovUS(){const u=_cUS();if(!u.name||!u.username||!u.password){alert('Nome, usuário e senha obrigatórios');return;}if(USERS.find(x=>x.username===u.username)){alert('Usuário já existe');return;}u.id=Math.max(...USERS.map(x=>x.id))+1;USERS.push(u);saveAll();cm();rUS(R('pc'));}
function openEditUS(idx){
  const u=USERS[idx];
  sm(`<div class="mt">✏️ Editar Usuário — ${esc(u.name)}</div>${usForm(u)}
    <div class="mac" style="justify-content:space-between">
      ${u.username!=='admin'?`<button class="btn bd" onclick="askDel('Usuário ${esc(u.name)} (${esc(u.username)})',function(){USERS.splice(${idx},1);saveAll();cm();rUS(R('pc'));})">🗑️ Apagar</button>`:'<span></span>'}
      <div style="display:flex;gap:10px"><button class="btn bs" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEditUS(${idx})">💾 Salvar</button></div>
    </div>`);
}
function svEditUS(idx){const u=_cUS();if(!u.name||!u.username||!u.password){alert('Nome, usuário e senha obrigatórios');return;}if(USERS.find((x,i)=>x.username===u.username&&i!==idx)){alert('Usuário já existe');return;}Object.assign(USERS[idx],u);if(currentUser&&currentUser.id===USERS[idx].id)currentUser=USERS[idx];saveAll();cm();rUS(R('pc'));}
